<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Process Integrity AM</title>
  <script>
    // SPA redirect for GitHub Pages — redirects unknown routes to the app,
    // preserving the path so React Router can handle it.
    // After: rafgraph/spa-github-pages (MIT)
    var segmentsToKeep = 1; // keep /Process-Integrity-AM/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
